name: Integração Contínua - ETL Pipeline

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Importar Portões de Qualidade Segregados
        run: |
          echo "Buscando regras de governança de repositório centralizado..."
          # A configuração de qualidade não reside no repositório do desenvolvedor
          wget -q https://raw.githubusercontent.com/governance-repo/qa/main/.pylintrc -O .pylintrc

      - name: Executar Validações de CI
        run: |
          echo "Executando testes automatizados e validações de infraestrutura..."
          python -m unittest discover tests/
